<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Gefühle 🎀</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,400&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Floating background deco -->
  <div class="deco-bg" aria-hidden="true">
    <span class="d d1">🌸</span>
    <span class="d d2">⭐</span>
    <span class="d d3">🌸</span>
    <span class="d d4">✨</span>
    <span class="d d5">🌟</span>
    <span class="d d6">🌸</span>
    <span class="d d7">⭐</span>
    <span class="d d8">✨</span>
  </div>

  <div class="container">

    <!-- Header -->
    <header>
      <div class="character" aria-hidden="true">
        <svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg" width="130" height="145">

          <!-- DRESS / BODY -->
          <ellipse cx="80" cy="148" rx="38" ry="28" fill="#fce4f0"/>
          <!-- dress skirt flare -->
          <path d="M46 138 Q50 165 80 168 Q110 165 114 138 Q97 155 80 155 Q63 155 46 138Z" fill="#f9c8e2"/>
          <!-- dress bodice -->
          <rect x="58" y="112" width="44" height="32" rx="10" fill="#fce4f0"/>
          <!-- collar bow -->
          <path d="M72 118 Q80 113 88 118 Q80 124 72 118Z" fill="#f4a7c3"/>
          <path d="M72 118 Q66 113 68 119 Q71 122 72 118Z" fill="#f4a7c3"/>
          <path d="M88 118 Q94 113 92 119 Q89 122 88 118Z" fill="#f4a7c3"/>
          <circle cx="80" cy="118" r="3.5" fill="#e882b0"/>

          <!-- ARMS -->
          <!-- left arm -->
          <path d="M58 120 Q44 128 42 140 Q46 143 50 140 Q52 131 62 125Z" fill="#fce4f0" stroke="#f4a7c3" stroke-width="1.2"/>
          <!-- right arm -->
          <path d="M102 120 Q116 128 118 140 Q114 143 110 140 Q108 131 98 125Z" fill="#fce4f0" stroke="#f4a7c3" stroke-width="1.2"/>
          <!-- little hands -->
          <circle cx="43" cy="141" r="5.5" fill="#fff0f8" stroke="#f4a7c3" stroke-width="1.2"/>
          <circle cx="117" cy="141" r="5.5" fill="#fff0f8" stroke="#f4a7c3" stroke-width="1.2"/>

          <!-- NECK -->
          <rect x="73" y="105" width="14" height="12" rx="6" fill="#fff0f8"/>

          <!-- HEAD -->
          <ellipse cx="80" cy="82" rx="36" ry="34" fill="#fff0f8"/>

          <!-- EARS (round bunny-style) -->
          <ellipse cx="53" cy="46" rx="13" ry="22" fill="#fff0f8" stroke="#f4a7c3" stroke-width="1.8"/>
          <ellipse cx="107" cy="46" rx="13" ry="22" fill="#fff0f8" stroke="#f4a7c3" stroke-width="1.8"/>
          <ellipse cx="53" cy="46" rx="7" ry="15" fill="#ffd6e8"/>
          <ellipse cx="107" cy="46" rx="7" ry="15" fill="#ffd6e8"/>

          <!-- HAIR fringe -->
          <path d="M46 72 Q52 55 60 62 Q65 50 72 60 Q77 48 80 58 Q83 48 88 60 Q95 50 100 62 Q108 55 114 72" fill="#c97bb0" stroke="none"/>
          <!-- hair sides -->
          <ellipse cx="47" cy="90" rx="10" ry="18" fill="#c97bb0"/>
          <ellipse cx="113" cy="90" rx="10" ry="18" fill="#c97bb0"/>

          <!-- BLUSH -->
          <ellipse cx="61" cy="93" rx="10" ry="6" fill="#ffb3d1" opacity="0.5"/>
          <ellipse cx="99" cy="93" rx="10" ry="6" fill="#ffb3d1" opacity="0.5"/>

          <!-- EYES — big cute oval eyes -->
          <ellipse cx="68" cy="83" rx="7" ry="8" fill="#3a2040"/>
          <ellipse cx="92" cy="83" rx="7" ry="8" fill="#3a2040"/>
          <!-- eye shine -->
          <circle cx="70.5" cy="80" r="2.8" fill="white"/>
          <circle cx="94.5" cy="80" r="2.8" fill="white"/>
          <circle cx="66.5" cy="86" r="1.2" fill="white" opacity="0.7"/>
          <circle cx="90.5" cy="86" r="1.2" fill="white" opacity="0.7"/>

          <!-- NOSE tiny -->
          <ellipse cx="80" cy="92" rx="2.5" ry="1.8" fill="#e882b0"/>

          <!-- MOUTH – cute small smile -->
          <path d="M75 96 Q80 100 85 96" stroke="#e882b0" stroke-width="1.8" fill="none" stroke-linecap="round"/>

          <!-- HEAD BOW -->
          <path d="M88 60 Q97 52 104 59 Q97 66 88 60Z" fill="#f4a7c3" stroke="#e882b0" stroke-width="1"/>
          <path d="M88 60 Q84 52 87 58 Q88 63 88 60Z" fill="#f4a7c3"/>
          <path d="M104 59 Q110 52 109 58 Q108 63 104 59Z" fill="#f4a7c3"/>
          <circle cx="96" cy="59.5" r="4" fill="#e882b0"/>

          <!-- LEGS -->
          <rect x="64" y="165" width="14" height="14" rx="7" fill="#fce4f0" stroke="#f4a7c3" stroke-width="1.2"/>
          <rect x="82" y="165" width="14" height="14" rx="7" fill="#fce4f0" stroke="#f4a7c3" stroke-width="1.2"/>
          <!-- shoes -->
          <ellipse cx="71" cy="179" rx="9" ry="5" fill="#e882b0"/>
          <ellipse cx="89" cy="179" rx="9" ry="5" fill="#e882b0"/>

        </svg>
      </div>

      <div class="ribbon">✨ Ich sage ehrlich ✨</div>
      <h1>Wie ich mich fühle</h1>
      <p class="subtitle">Tippe auf eine Option und sieh, wie es mir dabei geht 🌸<br>nur Ehrlichkeit.</p>
    </header>

    <!-- Cards -->
    <div class="cards">
      <button class="card" data-option="carlo">
        <span class="card-icon">🙈</span>
        <div class="card-body">
          <div class="card-label">Mit Carlo tanzen</div>
          <div class="card-hint">Tippe hier ↓</div>
        </div>
      </button>

      <button class="card card--me" data-option="ich">
        <span class="card-icon">🎀</span>
        <div class="card-body">
          <div class="card-label">Mit mir tanzen</div>
          <div class="card-hint">Tippe hier ↓</div>
        </div>
      </button>

      <button class="card" data-option="freundin">
        <span class="card-icon">🤍</span>
        <div class="card-body">
          <div class="card-label">Mit einer Freundin tanzen</div>
          <div class="card-hint">Tippe hier ↓</div>
        </div>
      </button>
    </div>

    <!-- Result -->
    <div class="result hidden" id="result">
      <div class="result-header">
        <span class="result-emoji" id="result-emoji"></span>
        <span class="result-title" id="result-title"></span>
      </div>

      <div class="meter-wrap">
        <div class="meter-labels">
          <span>😢 belastend</span>
          <span>glücklich 😊</span>
        </div>
        <div class="meter-track">
          <div class="meter-fill" id="meter-fill"></div>
          <div class="meter-thumb" id="meter-thumb">
            <span id="thumb-face"></span>
          </div>
        </div>
        <div class="meter-score" id="meter-score">0 / 100</div>
      </div>

      <p class="result-text" id="result-text"></p>

      <div class="sparkles" id="sparkles" aria-hidden="true"></div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="note-box">
        <span class="note-icon">🎀</span>
        <p>Diese App soll helfen, meine Gefühle zu verstehen, damit wir gemeinsam eine Lösung finden, die für beide in Ordnung ist.</p>
      </div>
    </footer>

  </div>
  <script src="script.js"></script>
</body>
</html>
